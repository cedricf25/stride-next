services:
  # ================================
  # Caddy - Reverse Proxy + HTTPS
  # ================================
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - stride-network

  # ================================
  # Next.js Application
  # ================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BETTER_AUTH_URL=${NEXT_PUBLIC_BETTER_AUTH_URL}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=mysql://stride:${DB_PASSWORD}@db:3306/stride
    depends_on:
      db:
        condition: service_healthy
    networks:
      - stride-network

  # ================================
  # MariaDB Database
  # ================================
  db:
    image: mariadb:11
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=stride
      - MYSQL_USER=stride
      - MYSQL_PASSWORD=${DB_PASSWORD}
    command: --bind-address=0.0.0.0
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - stride-network

volumes:
  mariadb_data:
  caddy_data:
  caddy_config:

networks:
  stride-network:
    driver: bridge
